<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>03 - Detección Partes del Rostro</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

</head>
<body>
  <h1>Detección de Partes del Rostro</h1>
  <div class="controles">
    <div>
      <label>Parte del rostro: </label>
      <select id="parte">
        <option value="ojos">Ojos</option>
        <option value="labios">Labios</option>
        <option value="nariz">Nariz</option>
        <option value="cejas">Cejas</option>
        <option value="cara">Cara completa</option>
      </select>
    </div>
    <div>
      <label>Color: </label>
      <input type="color" id="color" value="#ff00ff">
    </div>
  </div>

  <div id="contenedor">
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>
  <div id="info">Cargando...</div>

 <script src=""></script>ip
</body>
</html>
