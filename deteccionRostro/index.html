<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Partes del rostro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.10/p5.min.js"></script>
<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    font-family:Arial;
}

/* UI */
#panel{
    position:absolute;
    top:10px;
    left:10px;
    z-index:10;
    background:white;
    padding:10px;
    border-radius:10px;
}

select,input{
    margin:5px;
}
</style>
</head>

<body>

<div id="panel">
    <label>Parte:</label>
    <select id="parte">
        <option value="leftEye">Ojo Izquierdo</option>
        <option value="rightEye">Ojo Derecho</option>
        <option value="lips">Boca</option>
        <option value="nose">Nariz</option>
    </select>

    <input type="color" id="color" value="#ff0000">
</div>

<script src="./script.js"></script>

</body>
</html>
